kind = "api"
previewPath = "/api"
title = "API Server"
version = "1.0.0"
id = "3B4_FFSkEVBkAeYMFRJ2e"

[[services]]
localPort = 8000
name = "FastAPI Backend"
paths = ["/api"]

[services.development]
run = "cd /home/runner/workspace/artifacts/fastapi-backend && python3 -m uvicorn app.main:app --host 0.0.0.0 --port 8000"

[services.production]
run = "cd artifacts/fastapi-backend && pip install -r requirements.txt -q && python3 -m uvicorn app.main:app --host 0.0.0.0 --port 8000"

[services.production.health.startup]
path = "/api/healthz"
